<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Historia 💚</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#f0fdf4,#dcfce7);
    color:#14532d;
    overflow-x:hidden;
}

/* Partículas */
#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
    padding:30px 20px 100px;
    text-align:center;
}

h1{
    margin-bottom:30px;
}

/* Galería */
.gallery{
    display:flex;
    flex-direction:column;
    gap:35px;
}

.frame{
    background:white;
    padding:12px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,0.1);
    position:relative;
}

.frame img{
    width:100%;
    border-radius:18px;
}

/* Bordes verdes diferentes */
.frame1{ border:4px double #22c55e; }
.frame2{ border:4px solid; border-image:linear-gradient(45deg,#86efac,#16a34a) 1; }
.frame3{ border:4px dotted #4ade80; }
.frame4{ border:4px solid #15803d; box-shadow:0 0 25px rgba(34,197,94,0.4); }

.frame::after{
    content:"💚";
    position:absolute;
    top:-12px;
    right:-12px;
    background:#fff;
    padding:6px 8px;
    border-radius:50%;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* Mensaje final */
.final-message{
    margin-top:60px;
    padding:25px;
    background:linear-gradient(135deg,#bbf7d0,#86efac);
    border-radius:30px;
    font-family:'Quicksand',sans-serif;
    font-size:20px;
    font-weight:700;
    color:#14532d;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

    <h1>💚 Nuestra Historia 💚</h1>

    <audio autoplay loop>
        <source src="Stray Kids-Youtiful.mp3" type="audio/mpeg">
    </audio>

    <div class="gallery">
        <div class="frame frame1"><img src="IMG_20201215_010921.jpg" alt="Recuerdo 1"></div>
        <div class="frame frame2"><img src="IMG_20201215_010947.jpg" alt="Recuerdo 2"></div>
        <div class="frame frame3"><img src="IMG_20190225_180129.jpg" alt="Recuerdo 3"></div>
        <div class="frame frame4"><img src="IMG_20201207_163602.jpg" alt="Recuerdo 4"></div>
        <div class="frame frame2"><img src="IMG_20250101_132118.jpg" alt="Recuerdo 2"></div>
        <div class="frame frame3"><img src="IMG-20260307-WA0134.jpg" alt="Recuerdo 3"></div>
        <div class="frame frame4"><img src="IMG-20260307-WA0136.jpg" alt="Recuerdo 4"></div>  
        <div class="frame frame1"><img src="IMG-20260307-WA0137(1).jpg" alt="Recuerdo 1"></div>
        <div class="frame frame2"><img src="IMG-20260307-WA0135.jpg" alt="Recuerdo 2"></div>
    </div>

    <div class="final-message">
        💚 Eres una mujer excelente y no permitas que nadie te diga lo contrario 💚
    </div>

</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

class Particle{
    constructor(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*2 + 1;
        this.speedY = Math.random()*0.4 + 0.2;
        this.opacity = Math.random();
    }
    update(){
        this.y -= this.speedY;
        if(this.y < 0){
            this.y = canvas.height;
            this.x = Math.random()*canvas.width;
        }
    }
    draw(){
        ctx.fillStyle = "rgba(187,247,208,"+this.opacity+")";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

for(let i=0;i<80;i++){ particles.push(new Particle()); }

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{ p.update(); p.draw(); });
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
