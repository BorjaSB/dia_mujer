<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Historia 💜</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#f3e8ff,#e9d5ff);
    text-align:center;
    color:#6b21a8;
    overflow:hidden;
}

#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

.content{
    position:relative;
    z-index:1;
}

h1{
    margin-bottom:20px;
}

.gallery{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
}

.frame{
    background:white;
    padding:10px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.frame img{
    width:100%;
    border-radius:15px;
}

@media(min-width:600px){
    .gallery{
        grid-template-columns:1fr 1fr;
    }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="content">
    <h1>💜 Nuestra Historia 💜</h1>

    <!-- Música -->
    <audio autoplay loop>
        <source src="la-promesa-melendi.mp3" type="audio/mpeg">
    </audio>

    <div class="gallery">
        <div class="frame"><img src="foto1.jpg"></div>
        <div class="frame"><img src="foto2.jpg"></div>
        <div class="frame"><img src="foto3.jpg"></div>
        <div class="frame"><img src="foto4.jpg"></div>
    </div>
</div>

<script>
// Reutilizamos partículas
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle{
    constructor(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*2 + 1;
        this.speedY = Math.random()*0.5 + 0.2;
        this.opacity = Math.random();
    }
    update(){
        this.y -= this.speedY;
        if(this.y < 0){
            this.y = canvas.height;
            this.x = Math.random()*canvas.width;
        }
    }
    draw(){
        ctx.fillStyle = "rgba(255,255,255,"+this.opacity+")";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function init(){
    for(let i=0;i<100;i++){
        particlesArray.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particlesArray.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
