<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuestra Historia 💜</title>

<!-- Fuente redonda y elegante -->
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#f5edff,#e9d5ff);
    color:#6b21a8;
    overflow-x:hidden;
}

/* Canvas partículas */
#particles{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
}

/* Contenedor principal */
.container{
    position:relative;
    z-index:1;
    padding:30px 20px 100px 20px;
    text-align:center;
}

h1{
    margin-bottom:30px;
    font-size:26px;
}

/* Galería */
.gallery{
    display:flex;
    flex-direction:column;
    gap:35px;
}

/* Marco base */
.frame{
    background:white;
    padding:12px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(0,0,0,0.15);
    position:relative;
    transition:transform .4s ease;
}

.frame:hover{
    transform:scale(1.03);
}

.frame img{
    width:100%;
    border-radius:18px;
    display:block;
}

/* Bordes personalizados */
.frame1{ border:4px double #c084fc; }
.frame2{ border:4px solid; border-image:linear-gradient(45deg,#f472b6,#c084fc) 1; }
.frame3{ border:4px dotted #a855f7; }
.frame4{ border:4px solid #ec4899; box-shadow:0 0 25px rgba(236,72,153,0.4); }

/* Corazón decorativo */
.frame::after{
    content:"❤";
    position:absolute;
    top:-12px;
    right:-12px;
    background:#fff;
    color:#ec4899;
    font-size:18px;
    padding:6px 8px;
    border-radius:50%;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* ✅ MENSAJE FINAL */
.final-message{
    margin-top:60px;
    padding:25px;
    background:linear-gradient(135deg,#d8b4fe,#f0abfc);
    border-radius:30px;
    font-family:'Quicksand',sans-serif;
    font-size:20px;
    font-weight:700;
    color:#4c1d95;
    box-shadow:0 15px 40px rgba(0,0,0,0.2);
    animation:fadeUp 2s ease forwards;
    opacity:0;
}

@keyframes fadeUp{
    from{
        transform:translateY(30px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

/* Responsive */
@media(min-width:700px){
    .gallery{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:30px;
    }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

    <h1>💜 Hermosa mujer 💜</h1>

    <!-- Música -->
    <audio autoplay loop>
        <source src="la-promesa-melendi.mp3" type="audio/mpeg">
    </audio>

    <div class="gallery">
        <div class="frame frame1"><img src="IMG-20260306-WA0095.jpg" alt="Recuerdo 1"></div>
        <div class="frame frame2"><img src="IMG-20240512-WA0028.jpg" alt="Recuerdo 2"></div>
        <div class="frame frame3"><img src="IMG_20260306_170210.jpg" alt="Recuerdo 3"></div>
        <div class="frame frame4"><img src="IMG-20240811-WA0000.jpg" alt="Recuerdo 4"></div>
        <div class="frame frame1"><img src="IMG-20250101-WA0065.jpg" alt="Recuerdo 1"></div>
        <div class="frame frame2"><img src="IMG-20250217-WA0006.jpg" alt="Recuerdo 2"></div>
        <div class="frame frame3"><img src="IMG_20240227_160834_081.jpg" alt="Recuerdo 3"></div>
        <div class="frame frame4"><img src="IMG-20241101-WA0056.jpg" alt="Recuerdo 4"></div>
        <div class="frame frame1"><img src="IMG-20240609-WA0022.jpg" alt="Recuerdo 1"></div>
        <div class="frame frame2"><img src="IMG_20260306_170247.jpg" alt="Recuerdo 2"></div>
        <div class="frame frame3"><img src="IMG_20231201_112055.jpg" alt="Recuerdo 3"></div>
        <div class="frame frame3"><img src="IMG-20250217-WA0013.jpg" alt="Recuerdo 4"></div>
        <div class="frame frame1"><img src="IMG_20240303_003547_725.jpg" alt="Recuerdo 1"></div>
    </div>

    <!-- ✅ MENSAJE RESALTADO -->
    <div class="final-message">
        💜 Eres una mujer maravillosa y no permitas que nadie te diga lo contrario 💜. I love you 💜
    </div>

</div>

<script>
// Ajuste dinámico canvas
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particlesArray = [];

class Particle{
    constructor(){
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*2 + 1;
        this.speedY = Math.random()*0.4 + 0.2;
        this.opacity = Math.random();
    }
    update(){
        this.y -= this.speedY;
        if(this.y < 0){
            this.y = canvas.height;
            this.x = Math.random()*canvas.width;
        }
    }
    draw(){
        ctx.fillStyle = "rgba(255,255,255,"+this.opacity+")";
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
        ctx.fill();
    }
}

function init(){
    particlesArray = [];
    for(let i=0;i<80;i++){
        particlesArray.push(new Particle());
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particlesArray.forEach(p=>{
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();
</script>

</body>
</html>
